name: Daily Knowledge Collection

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate JSON articles
        if: always()
        run: |
          if ls knowledge/articles/*.json 1>/dev/null 2>&1; then
            python hooks/validate_json.py knowledge/articles/*.json
          else
            echo "No article files to validate"
          fi

      - name: Check article quality
        if: always()
        run: |
          if ls knowledge/articles/*.json 1>/dev/null 2>&1; then
            python hooks/check_quality.py knowledge/articles/*.json
          else
            echo "No article files to check"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/articles/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          COUNT=$(git diff --staged --name-only --diff-filter=A knowledge/articles/ | wc -l)
          git commit -m "Collect ${COUNT} articles on $(date +%Y-%m-%d)"
          git push
